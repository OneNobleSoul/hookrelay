name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem
      description: What are you trying to do that's awkward or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like
      description: Rough shape of the feature. Config snippets welcome.
    validations:
      required: false
