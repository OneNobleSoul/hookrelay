name: Bug report
description: Something isn't working the way it should
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal config and the request you sent, if possible.
      placeholder: |
        1. config.json ...
        2. curl -X POST ...
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: hookrelay version
      description: output of `hookrelay --version`
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
    validations:
      required: false
